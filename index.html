<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Cadara Studio is preparing a new design studio website.">
  <meta property="og:title" content="Cadara Studio — Coming Soon">
  <meta property="og:description" content="A new design studio website is on the way.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <title>Cadara Studio — Coming Soon</title>
  <style>
    :root {
      --bg: #f4f4f1;
      --ink: #050505;
      --muted: #6c6b66;
      --line: rgba(5, 5, 5, 0.14);
      --accent: #4c32ff;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(24px, 3vw, 42px);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.04em;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--bg);
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.05em;
    }

    .contact {
      color: var(--accent);
      font-size: clamp(20px, 2.4vw, 36px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .hero {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
      align-items: end;
      gap: 56px;
      padding: 12vh 0 40px;
    }

    .eyebrow {
      margin: 0 0 26px;
      font-size: clamp(13px, 1.1vw, 16px);
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 1050px;
      margin: 0;
      font-size: clamp(76px, 11.8vw, 190px);
      font-weight: 500;
      line-height: 0.88;
      letter-spacing: -0.08em;
    }

    .side {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 28px;
      border-left: 1px solid var(--line);
      padding-left: 32px;
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: clamp(18px, 1.5vw, 24px);
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .status {
      display: grid;
      gap: 14px;
      padding: 22px;
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 1px 0 rgba(5, 5, 5, 0.08);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
      font-weight: 700;
    }

    .status-row:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--ink);
      color: var(--bg);
      white-space: nowrap;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 860px) {
      .page {
        padding: 22px;
      }

      .hero {
        grid-template-columns: 1fr;
        align-items: start;
        gap: 42px;
        padding-top: 11vh;
      }

      .side {
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: 28px 0 0;
      }

      h1 {
        font-size: clamp(64px, 18vw, 112px);
      }

      .footer {
        flex-direction: column;
      }
    }

    @media (max-width: 520px) {
      .header {
        align-items: flex-start;
      }

      .mark {
        width: 34px;
        height: 34px;
        font-size: 20px;
      }

      .contact {
        max-width: 120px;
        text-align: right;
      }

      .status-row {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header" aria-label="Cadara Studio">
      <a class="brand" href="/" aria-label="Cadara Studio home">
        <span class="mark">c</span>
        <span>cadara</span>
      </a>
      <a class="contact" href="mailto:hello@cadara.studio">hello@cadara.studio</a>
    </header>

    <section class="hero" aria-labelledby="coming-soon-title">
      <div>
        <p class="eyebrow">Design studio in progress</p>
        <h1 id="coming-soon-title">Coming soon.</h1>
      </div>

      <aside class="side" aria-label="Studio status">
        <p class="note">
          We are shaping a new studio for digital products, brand systems, and sharp visual experiences.
        </p>

        <div class="status">
          <div class="status-row">
            <span>Studio</span>
            <span class="pill">Cadara</span>
          </div>
          <div class="status-row">
            <span>Focus</span>
            <span>UX, web, identity</span>
          </div>
          <div class="status-row">
            <span>Launch</span>
            <span>Soon</span>
          </div>
        </div>
      </aside>
    </section>

    <footer class="footer">
      <span>Cadara Studio</span>
      <span>New website loading</span>
    </footer>
  </main>
</body>
</html>
