<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Cadara Studio is preparing a new design studio website.">
  <meta property="og:title" content="Cadara Studio — Coming Soon">
  <meta property="og:description" content="A new design studio website is on the way.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <title>Cadara Studio — Coming Soon</title>
  <style>
    :root {
      --bg: #f4f4f1;
      --ink: #050505;
      --muted: #6c6b66;
      --line: rgba(5, 5, 5, 0.14);
      --accent: #4c32ff;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding: 32px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(24px, 3vw, 42px);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.04em;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--ink);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .mark svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .contact {
      color: var(--accent);
      font-size: clamp(20px, 2.4vw, 36px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      overflow-wrap: anywhere;
    }

    .hero {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
      align-items: end;
      gap: 56px;
      padding: 12vh 0 40px;
    }

    h1 {
      max-width: 1050px;
      margin: 0;
      font-size: clamp(76px, 11.8vw, 190px);
      font-weight: 500;
      line-height: 0.88;
      letter-spacing: -0.08em;
    }

    .side {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 28px;
      border-left: 1px solid var(--line);
      padding-left: 32px;
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: clamp(18px, 1.5vw, 24px);
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .status {
      display: grid;
      gap: 14px;
      padding: 22px;
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 1px 0 rgba(5, 5, 5, 0.08);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
      font-weight: 700;
    }

    .status-row:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--ink);
      color: var(--bg);
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      .page {
        padding: 22px;
        overflow: visible;
      }

      .hero {
        grid-template-columns: 1fr;
        align-items: start;
        gap: 36px;
        padding: 10vh 0 32px;
      }

      .side {
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: 28px 0 0;
      }

      h1 {
        font-size: clamp(60px, 17vw, 112px);
      }

    }

    @media (max-width: 520px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
      }

      .brand {
        font-size: 30px;
      }

      .mark {
        width: 34px;
        height: 34px;
      }

      .contact {
        max-width: 100%;
        font-size: clamp(22px, 7vw, 32px);
        line-height: 0.95;
        text-align: left;
      }

      .hero {
        gap: 30px;
        padding-top: 8vh;
      }

      h1 {
        font-size: clamp(58px, 22vw, 92px);
        line-height: 0.9;
      }

      .note {
        font-size: 18px;
      }

      .status {
        padding: 18px;
        border-radius: 22px;
      }

      .status-row {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }

    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header" aria-label="Cadara Studio">
      <a class="brand" href="/" aria-label="Cadara Studio home">
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 42 42" role="img" focusable="false">
            <circle cx="21" cy="21" r="21" fill="#050505"/>
            <path d="M28.8 12.8c-2.1-1.9-4.7-2.9-7.8-2.9-6.3 0-11.1 4.8-11.1 11.1S14.7 32.1 21 32.1c3.2 0 5.9-1.1 8-3.1l-4.1-4.2c-1 .9-2.2 1.4-3.8 1.4-2.9 0-5-2.1-5-5.2s2.1-5.2 5-5.2c1.5 0 2.8.5 3.7 1.4l4-4.4Z" fill="#f4f4f1"/>
            <path d="M24.1 20.9c0-1.8 1.4-3.2 3.2-3.2h5.4v6.4h-5.4c-1.8 0-3.2-1.4-3.2-3.2Z" fill="#050505"/>
          </svg>
        </span>
        <span>cadara</span>
      </a>
      <a class="contact" href="mailto:info@cadarstudio.com">info@cadarstudio.com</a>
    </header>

    <section class="hero" aria-labelledby="coming-soon-title">
      <div>
        <h1 id="coming-soon-title">Coming soon.</h1>
      </div>

      <aside class="side" aria-label="Studio status">
        <p class="note">
          We are shaping a new studio for digital products, brand systems, and sharp visual experiences.
        </p>

        <div class="status">
          <div class="status-row">
            <span>Studio</span>
            <span class="pill">Cadara</span>
          </div>
          <div class="status-row">
            <span>Focus</span>
            <span>UX, web, identity</span>
          </div>
          <div class="status-row">
            <span>Launch</span>
            <span>Soon</span>
          </div>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
