<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Cadara Studio is preparing a new design studio website.">
  <meta property="og:title" content="Cadara Studio — Coming Soon">
  <meta property="og:description" content="A new design studio website is on the way.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <title>Cadara Studio — Coming Soon</title>
  <style>
    @font-face {
      font-family: "Uncut Sans";
      src: url("landing-assets/UncutSans-Medium.woff") format("woff");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Uncut Sans";
      src: url("landing-assets/UncutSans-Semibold.woff") format("woff");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Outage Cut";
      src: url("landing-assets/Outage-Cut.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --blue: #021DFF;
      --white: #ffffff;
      --blue-ink: #2337e8;
      --blue-soft: rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      margin: 0;
      background: var(--blue);
      color: var(--white);
      font-family: "Uncut Sans", Arial, sans-serif;
      font-weight: 500;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      isolation: isolate;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      background-color: var(--blue);
    }

    .page::before {
      content: "";
      position: absolute;
      inset: -14%;
      z-index: -4;
      background:
        radial-gradient(circle at 18% 20%, rgba(0, 4, 129, 0.54) 0 13%, transparent 27%),
        radial-gradient(circle at 70% 23%, rgba(255, 255, 255, 0.09) 0 17%, transparent 32%),
        linear-gradient(135deg, #0610d7 0%, var(--blue) 42%, #000a9b 100%);
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.22;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 7px);
      background-size: 84px 84px, 84px 84px, 100% 7px;
      mix-blend-mode: overlay;
      animation: scan 9s linear infinite;
    }

    .orb {
      position: absolute;
      z-index: -3;
      width: min(72vw, 980px);
      aspect-ratio: 1.14;
      background-image: url("landing-assets/bg.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.7;
      filter: saturate(1.3) contrast(1.04);
      mix-blend-mode: screen;
      transform: translate3d(0, 0, 0);
      animation: drift 18s ease-in-out infinite alternate;
    }

    .orb-one {
      top: -18%;
      left: 6%;
    }

    .orb-two {
      right: -20%;
      bottom: 5%;
      width: min(64vw, 860px);
      opacity: 0.5;
      animation-delay: -5s;
    }

    .orb-three {
      left: -19%;
      bottom: -22%;
      width: min(57vw, 760px);
      opacity: 0.48;
      animation-delay: -9s;
    }

    .digital-field {
      position: absolute;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: 0.42;
      background:
        linear-gradient(115deg, transparent 0 42%, rgba(255, 255, 255, 0.16) 43%, transparent 44% 100%),
        linear-gradient(24deg, transparent 0 62%, rgba(0, 0, 0, 0.28) 63%, transparent 66% 100%);
      mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
    }

    .digital-field::before,
    .digital-field::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.42;
      background: repeating-linear-gradient(
        90deg,
        transparent 0 28px,
        rgba(255, 255, 255, 0.1) 28px 30px,
        transparent 30px 96px
      );
      transform: skewX(-18deg) translateX(-22%);
      animation: dataSweep 7s linear infinite;
    }

    .digital-field::after {
      opacity: 0.28;
      transform: skewX(18deg) translateX(18%);
      animation-duration: 11s;
      animation-direction: reverse;
    }

    .shell {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(28px, 4.5vw, 78px) clamp(24px, 4.4vw, 72px) 0;
    }

    .content {
      width: min(100%, 690px);
      padding-top: clamp(0px, 2.6vh, 32px);
    }

    .symbol {
      width: clamp(54px, 5.2vw, 96px);
      height: auto;
      display: block;
      margin-bottom: clamp(28px, 3.7vw, 54px);
    }

    h1 {
      margin: 0 0 clamp(20px, 2vw, 34px);
      font-size: clamp(42px, 5.2vw, 84px);
      font-weight: 600;
      line-height: 0.9;
      letter-spacing: -0.035em;
      text-transform: uppercase;
    }

    .lede {
      max-width: 690px;
      margin: 0;
      font-size: clamp(20px, 2.1vw, 36px);
      line-height: 1.18;
      letter-spacing: -0.045em;
    }

    .contact-pill {
      width: fit-content;
      min-height: 72px;
      display: inline-flex;
      align-items: center;
      gap: 26px;
      margin-top: clamp(30px, 3.7vw, 58px);
      padding: 14px 24px 14px 32px;
      border-radius: 999px;
      background: var(--white);
      color: var(--blue-ink);
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.16);
    }

    .pill-text {
      font-size: clamp(16px, 1.1vw, 22px);
      line-height: 1;
      white-space: nowrap;
    }

    .socials {
      display: inline-flex;
      align-items: center;
      gap: 18px;
    }

    .social-link {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      color: var(--blue-ink);
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .social-link:hover {
      transform: translateY(-2px);
      opacity: 0.78;
    }

    .social-link svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .wordmark {
      align-self: center;
      margin: auto 0 clamp(18px, 2.6vw, 42px);
      color: var(--white);
      font-family: "Outage Cut", Impact, sans-serif;
      font-size: min(23.6vw, 454px);
      font-weight: 400;
      line-height: 0.58;
      letter-spacing: -0.043em;
      text-transform: uppercase;
      white-space: nowrap;
      transform: none;
      user-select: none;
      pointer-events: none;
    }

    @keyframes scan {
      from {
        background-position: 0 0, 0 0, 0 0;
      }
      to {
        background-position: 84px 84px, -84px 84px, 0 70px;
      }
    }

    @keyframes drift {
      from {
        transform: translate3d(-1.8%, -1.4%, 0) scale(1);
      }
      to {
        transform: translate3d(2.4%, 2%, 0) scale(1.045);
      }
    }

    @keyframes dataSweep {
      from {
        background-position-x: 0;
      }
      to {
        background-position-x: 480px;
      }
    }

    @media (max-width: 900px) {
      .shell {
        padding: 28px 28px 0;
      }

      .content {
        padding-top: clamp(0px, 3vh, 30px);
      }

      .lede {
        max-width: 520px;
      }

      .wordmark {
        font-size: 23.4vw;
        line-height: 0.58;
      }
    }

    @media (max-width: 520px) {
      .shell {
        padding: 28px 20px 0;
      }

      .content {
        padding-top: clamp(0px, 2vh, 18px);
      }

      .symbol {
        width: 48px;
        margin-bottom: 42px;
      }

      h1 {
        max-width: 320px;
        margin-bottom: 14px;
        font-size: clamp(35px, 10vw, 46px);
        line-height: 0.95;
      }

      .lede {
        max-width: 290px;
        font-size: clamp(15px, 4.4vw, 18px);
        line-height: 1.22;
      }

      .contact-pill {
        min-height: 52px;
        gap: 15px;
        margin-top: 28px;
        padding: 11px 15px 11px 20px;
      }

      .pill-text {
        font-size: 12px;
      }

      .socials {
        gap: 11px;
      }

      .social-link {
        width: 21px;
        height: 21px;
      }

      .orb-one {
        width: 180vw;
        top: -4%;
        left: -72%;
      }

      .orb-two {
        width: 170vw;
        right: -105%;
        bottom: 8%;
      }

      .orb-three {
        width: 140vw;
        left: -85%;
        bottom: -18%;
      }

      .wordmark {
        align-self: flex-start;
        width: 100%;
        margin-bottom: 18px;
        font-size: 22.5vw;
        line-height: 0.58;
        text-align: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .page::after,
      .orb,
      .digital-field::before,
      .digital-field::after {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="orb orb-one" aria-hidden="true"></div>
    <div class="orb orb-two" aria-hidden="true"></div>
    <div class="orb orb-three" aria-hidden="true"></div>
    <div class="digital-field" aria-hidden="true"></div>

    <div class="shell">
      <section class="content" aria-labelledby="coming-soon-title">

        <p class="lede">We are shaping a new studio for digital products, brand systems, and sharp visual experiences.</p>

          </div>
        </div>
      </section>

      <div class="wordmark" aria-hidden="true">CADARA</div>
    </div>
  </main>
</body>
</html>
