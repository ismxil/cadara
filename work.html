    <style>
        body {
            overflow: hidden;
            /* Vital for infinite canvas */
            background-color: var(--brand-black, #FFF3DE);
            color: var(--brand-red, #2660A4);
            cursor: grab;
        }

        body:active {
            cursor: grabbing;
        }

        /* ── Randomize button: icon uses page background color ── */
        #color-randomizer svg path {
            fill: var(--brand-black, #FFF3DE);
        }

        /* Canvas Container & Grid */
        #canvas-viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        /* The master container we move with translate3d */
        #canvas-grid {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
            display: grid;
            grid-template-columns: repeat(3, max-content);
            grid-template-rows: repeat(3, max-content);
        }

        /* ── Grid block: alternating 2×2-small + large cell pattern ──
           Pair 1 (odd):  [2×2 small | large]  — top two rows
           Pair 2 (even): [large | 2×2 small]  — bottom two rows
           Large cell = 2s + gap, matching 2×2 footprint exactly.       ── */
        .canvas-block {
            display: grid;
            grid-template-columns: repeat(4, 400px);
            grid-template-rows: repeat(4, 400px);
            grid-template-areas:
                "a  b  e  e"
                "c  d  e  e"
                "f  f  g  h"
                "f  f  i  j";
            gap: 6px;
            padding: 3px;
            background-color: var(--brand-black);
        }

        /* Grid area assignments */
        .gc-a { grid-area: a; }
        .gc-b { grid-area: b; }
        .gc-c { grid-area: c; }
        .gc-d { grid-area: d; }
        .gc-e { grid-area: e; }   /* large — top-right */
        .gc-f { grid-area: f; }   /* large — bottom-left */
        .gc-g { grid-area: g; }
        .gc-h { grid-area: h; }
        .gc-i { grid-area: i; }
        .gc-j { grid-area: j; }

        /* Individual cards */
        .canvas-card {
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            background-color: var(--brand-red);
            border-radius: 20px;
        }

        .canvas-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: grayscale(100%);
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.5s ease;
        }

        .canvas-card:hover img {
            transform: scale(1.06);
            filter: grayscale(0%);
        }

        /* Dark gradient overlay — only visible on hover */
        a.canvas-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 55%);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        a.canvas-card:hover::before {
            opacity: 1;
        }

        /* Hover icon — slides up, no title text */
        .canvas-card-content {
            position: relative;
            z-index: 20;
            display: flex;
            justify-content: flex-end;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .canvas-card:hover .canvas-card-content {
            opacity: 1;
            transform: translateY(0);
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari and Opera */
        }
    </style>
</head>

            </a>

        </div>
    </template>


    <!-- Project Case Study Modal -->
    <div id="project-modal"
        class="fixed inset-0 z-[120] flex flex-col md:flex-row opacity-0 pointer-events-none overflow-y-auto md:overflow-hidden"
        style="background-color: var(--brand-black); color: var(--brand-red); transition: opacity 0.4s ease;">

        <!-- ── LEFT: Info Panel ── -->
        <aside id="modal-info"
            class="relative w-full md:w-[360px] md:flex-shrink-0 md:h-screen md:overflow-y-auto flex flex-col px-8 pt-10 pb-10 md:px-10 md:pt-14 md:pb-12"
            style="background-color: var(--brand-red); color: var(--brand-black); transition: transform 0.45s cubic-bezier(0.25,1,0.5,1);">

            <!-- Close -->
            <button id="modal-close-btn"
                class="absolute top-6 right-6 w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 hover:bg-brand-black hover:text-brand-red transition-colors duration-200"
                style="border: 1px solid var(--brand-black);"
                aria-label="Close">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5">
                    <line x1="5" y1="5" x2="19" y2="19" />
                    <line x1="19" y1="5" x2="5" y2="19" />
                </svg>
            </button>

            <!-- Index -->
            <p id="modal-index" class="font-mono text-[10px] uppercase tracking-widest mb-10" style="opacity:0.4;">— 01</p>

            <!-- Title -->
            <h2 id="modal-title"
                class="font-display font-black uppercase leading-[0.88] mb-5"
                style="font-size: clamp(2.8rem, 8vw, 4rem);">PROJECT</h2>

            <!-- Tags -->
            <div id="modal-tags" class="flex flex-wrap gap-2 mb-8"></div>

            <!-- Description -->
            <p id="modal-desc" class="font-serif text-sm leading-[1.75] mb-auto" style="opacity: 0.65;"></p>

            <!-- Footer: link + CTA -->
            <div class="mt-10 flex flex-col gap-3">
                <a id="modal-url" href="#" target="_blank" rel="noopener noreferrer"
                    class="inline-flex items-center gap-1.5 font-mono text-[11px] uppercase tracking-widest hover:opacity-100 transition-opacity"
                    style="opacity: 0.4;">
                    <span id="modal-url-text">Visit site</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none"

                        <path d="M7 17L17 7M17 7H7M17 7v10" />
                    </svg>
                </a>
                <a href="contact.html"
                    class="text-center py-3.5 rounded-full font-display uppercase tracking-widest text-xs hover:opacity-90 transition-opacity"
                    style="background-color: var(--brand-black); color: var(--brand-red);">Work with us</a>
            </div>

        <!-- ── RIGHT: Image scroll ── -->
        <div id="modal-images"
            class="flex-1 md:h-screen md:overflow-y-auto"
            style="transition: transform 0.45s cubic-bezier(0.25,1,0.5,1);">

                d="M15.98 1.804a1 1 0 0 0-1.96 0l-.24 1.192a1 1 0 0 1-.784.785l-1.192.238a1 1 0 0 0 0 1.962l1.192.238a1 1 0 0 1 .785.785l.238 1.192a1 1 0 0 0 1.962 0l.238-1.192a1 1 0 0 1 .785-.785l1.192-.238a1 1 0 0 0 0-1.962l-1.192-.238a1 1 0 0 1-.785-.785zm-9.031 3.88a1 1 0 0 0-1.898 0l-.683 2.051a1 1 0 0 1-.633.633l-2.051.683a1 1 0 0 0 0 1.898l2.051.684a1 1 0 0 1 .633.632l.683 2.051a1 1 0 0 0 1.898 0l.683-2.051a1 1 0 0 1 .633-.633l2.051-.683a1 1 0 0 0 0-1.898l-2.051-.683a1 1 0 0 1-.633-.633zm7 8a1 1 0 0 0-1.898 0l-.184.551a1 1 0 0 1-.632.633l-.551.183a1 1 0 0 0 0 1.898l.551.183a1 1 0 0 1 .633.633l.183.551a1 1 0 0 0 1.898 0l.184-.551a1 1 0 0 1 .632-.633l.551-.183a1 1 0 0 0 0-1.898l-.551-.184a1 1 0 0 1-.633-.632z" />

    <script src="script.js"></script>
    <script>
        // Fade out mobile drag hint
        (function() {
            var hint = document.getElementById('drag-hint');
            if (hint) setTimeout(function() { hint.style.opacity = '0'; }, 2800);
        })();
    </script>
    <script>
        // --- INFINITE CANVAS LOGIC ---
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('canvas-grid');
            const template = document.getElementById('block-template');
            if (!grid || !template) return;

            // Clone the block 9 times (3x3 grid) to wrap properly
            for (let i = 0; i < 9; i++) {
                grid.appendChild(template.content.cloneNode(true));
            }

            // After painting, we calculate the size of a ONE block.
            let blockWidth = 0;
            let blockHeight = 0;

            function measureBlock() {
                const firstBlock = grid.querySelector('.canvas-block');
                if (firstBlock && firstBlock.offsetWidth > 0) {
                    // offsetWidth/Height are transform-independent — no false zeros
                    blockWidth = firstBlock.offsetWidth;
                    blockHeight = firstBlock.offsetHeight;
                }
            }

            // Measure after layout and again after all resources load
            requestAnimationFrame(() => requestAnimationFrame(measureBlock));
            window.addEventListener('load', measureBlock);
            window.addEventListener('resize', measureBlock);

            // Positioning and momentum variables
            let x = 0;
            let y = 0;
            let targetX = 0;
            let targetY = 0;
            let isDragging = false;
            let hasDragged = false;
            let lastMouseX = 0;
            let lastMouseY = 0;

            // Start drag
            window.addEventListener('mousedown', (e) => {
                // If they clicked the nav, let the nav handle it
                if (e.target.closest('#nav-overlay') || e.target.closest('.fixed.top-0') || e.target.closest('#color-randomizer')) return;

                // Allow clicking links natively if no drag happens
                // e.preventDefault(); 

                isDragging = true;
                hasDragged = false; // Reset drag detection
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                document.body.style.cursor = 'grabbing';
            });

            // Dragging (Move)
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                const deltaX = e.clientX - lastMouseX;
                const deltaY = e.clientY - lastMouseY;

                // If they moved more than 3 pixels, we consider it a drag (not a click)
                if (Math.abs(deltaX) > 3 || Math.abs(deltaY) > 3) {
                    hasDragged = true;
                }

                targetX -= deltaX * 1.5;
                targetY -= deltaY * 1.5;

                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            });

            // End drag
            window.addEventListener('mouseup', () => {
                isDragging = false;
                document.body.style.cursor = 'grab';
            });

            // Stop click if we dragged, otherwise open modal
            grid.addEventListener('click', (e) => {
                const card = e.target.closest('.canvas-card');
                if (hasDragged) {
                    e.preventDefault();
                    e.stopPropagation();
                } else if (card) {
                    e.preventDefault();
                    e.stopPropagation();
                    openProjectModal(card);
                }
            });

            // Touch support
            window.addEventListener('touchstart', (e) => {
                if (e.target.closest('#nav-overlay') || e.target.closest('.fixed.top-0') || e.target.closest('#color-randomizer')) return;

                isDragging = true;
                hasDragged = false;
                lastMouseX = e.touches[0].clientX;
                lastMouseY = e.touches[0].clientY;
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                e.preventDefault();

                const deltaX = e.touches[0].clientX - lastMouseX;
                const deltaY = e.touches[0].clientY - lastMouseY;

                if (Math.abs(deltaX) > 3 || Math.abs(deltaY) > 3) {
                    hasDragged = true;
                }

                targetX -= deltaX * 1.5;
                targetY -= deltaY * 1.5;

                lastMouseX = e.touches[0].clientX;
                lastMouseY = e.touches[0].clientY;
            }, { passive: false });

            window.addEventListener('touchend', () => {
                isDragging = false;
            });

            // Add basic wheel tracking for trackpads
            window.addEventListener('wheel', (e) => {
                if (e.target.closest('#nav-overlay')) return;
                targetX += e.deltaX * 1.5;
                targetY += e.deltaY * 1.5;
            }, { passive: true });

            // Animation Loop (Inertia + Toroidal Wrapping)
            function tick() {
                // Auto-remeasure if not yet captured (e.g. first few frames)
                if (blockWidth === 0) measureBlock();

                // Smooth interpolation (lerp)
                x += (targetX - x) * 0.08;
                y += (targetY - y) * 0.08;

                if (blockWidth > 0 && blockHeight > 0) {
                    // Normalize the wrapped coordinates 
                    // To do modulo properly in JS with negative numbers: ((ans % w) + w) % w
                    if (x > blockWidth / 2) {
                        x -= blockWidth;
                        targetX -= blockWidth;
                    } else if (x < -blockWidth / 2) {
                        x += blockWidth;
                        targetX += blockWidth;
                    }

                    if (y > blockHeight / 2) {
                        y -= blockHeight;
                        targetY -= blockHeight;
                    } else if (y < -blockHeight / 2) {
                        y += blockHeight;
                        targetY += blockHeight;
                    }
                }

                // Apply rendering position
                grid.style.transform = `translate3d(calc(-50% - ${x}px), calc(-50% - ${y}px), 0)`;
                requestAnimationFrame(tick);
            }

            // Start the loop
            requestAnimationFrame(tick);

            // --- Modal Logic ---
            const modal = document.getElementById('project-modal');
            const modalInfo = document.getElementById('modal-info');
            const modalImages = document.getElementById('modal-images');
            const closeBtn = document.getElementById('modal-close-btn');

            // Per-project metadata
            const projectMeta = {
                'Cadana':        { index: '01', tags: ['Fintech', 'UX/UI', 'Product'],         url: 'cadana.io',        desc: 'End-to-end product design for Cadana — a payroll and cross-border payments platform built for African workers and global businesses.' },
                'Gomoney':       { index: '02', tags: ['Banking', 'UX/UI', 'Mobile'],           url: 'gomoney.me',       desc: 'A full product redesign for GoMoney — digital banking built from the ground up for Africa\'s mobile-first generation.' },
                'Mezovest':      { index: '03', tags: ['Logistics', 'Product Design'],          url: 'mezovest.com',     desc: 'Investment and portfolio management platform designed to simplify access to high-yield financial assets for everyday investors.' },
                'Sterling Bank': { index: '04', tags: ['Enterprise', 'Banking', 'UX'],          url: 'sterlingbank.com', desc: 'Modernising the Sterling Bank mobile experience for millions of Nigerian customers — from legacy to leading.' },
                'Motel One':     { index: '05', tags: ['Hospitality', 'Web Design'],            url: 'motel-one.com',    desc: 'A refined digital booking experience for Motel One, balancing premium aesthetics with conversion-driven design decisions.' },
                'Lemfi':         { index: '06', tags: ['Fintech', 'Transfer', 'Brand'],         url: 'lemfi.com',        desc: 'Debit card and product design for Lemfi, supporting its growth strategy and brand expansion in the UK market.' },
                'Moniepoint':    { index: '07', tags: ['Finance', 'POS', 'UX'],                 url: 'moniepoint.com',   desc: 'Simplifying merchant payments for Moniepoint — crafting intuitive flows across Nigeria\'s largest POS network.' },
                'Kuda':          { index: '08', tags: ['Banking', 'Mobile', 'UX'],              url: 'kuda.com',         desc: 'Product design work for Kuda Bank — crafting delightful mobile banking experiences for the bank of every Nigerian.' }
            };

            function openProjectModal(card) {
                const img = card.querySelector('img');
                if (!img) return;

                const name = card.dataset.project || '';
                const meta = projectMeta[name] || { index: '—', tags: [], url: null, desc: '' };

                // Fill left panel
                document.getElementById('modal-index').textContent = `— ${meta.index}`;
                document.getElementById('modal-title').textContent = name;
                document.getElementById('modal-desc').textContent = meta.desc;
                document.getElementById('modal-tags').innerHTML = meta.tags.map(t =>
                    `<span style="font-size:9px;text-transform:uppercase;letter-spacing:0.1em;border:1px solid currentColor;border-radius:999px;padding:4px 12px;opacity:0.5;">${t}</span>`
                ).join('');

                const urlEl = document.getElementById('modal-url');
                document.getElementById('modal-url-text').textContent = meta.url || '';
                urlEl.href = meta.url ? `https://${meta.url}` : '#';
                urlEl.style.display = meta.url ? '' : 'none';

                // Build right panel
                const src = img.src;
                modalImages.innerHTML = `
                    <div style="width:100%;height:85vh;overflow:hidden;flex-shrink:0;">
                        <img src="${src}" alt="${name}" style="width:100%;height:100%;object-fit:cover;display:block;">
                    </div>
                    <div style="width:100%;padding:52px 48px 64px;background-color:var(--brand-red);color:var(--brand-black);flex-shrink:0;">
                        <p style="font-family:'Midnight Sans',sans-serif;font-size:clamp(3rem,8vw,5.5rem);line-height:0.88;font-weight:900;text-transform:uppercase;margin-bottom:16px;">${name}</p>
                        <p style="font-family:monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;opacity:0.45;">${meta.tags.join(' · ')}</p>
                    </div>
                `;
                modalImages.scrollTop = 0;

                // Slide in from edges (set initial offsets without transition)
                modalInfo.style.transitionDuration = '0s';
                modalImages.style.transitionDuration = '0s';
                modalInfo.style.transform = 'translateX(-24px)';
                modalImages.style.transform = 'translateX(24px)';

                // Show modal, hide header
                modal.classList.remove('opacity-0', 'pointer-events-none');
                document.body.style.overflow = 'hidden';
                const header = document.getElementById('site-header');
                if (header) header.style.opacity = '0';

                // Animate to resting position
                requestAnimationFrame(() => {
                    modalInfo.style.transitionDuration = '';
                    modalImages.style.transitionDuration = '';
                    modalInfo.style.transform = 'translateX(0)';
                    modalImages.style.transform = 'translateX(0)';
                });
            }

            function closeModal() {
                modal.classList.add('opacity-0');
                const header = document.getElementById('site-header');
                if (header) header.style.opacity = '1';
                setTimeout(() => {
                    modal.classList.add('pointer-events-none');
                    document.body.style.overflow = '';
                }, 400);
            }

            closeBtn && closeBtn.addEventListener('click', closeModal);

            // Click backdrop (right panel empty space) to close
            modalImages && modalImages.addEventListener('click', (e) => {
                if (e.target === modalImages) closeModal();
            });

            // Keyboard
            window.addEventListener('keydown', (e) => {
                if (modal.classList.contains('opacity-0')) return;
                if (e.key === 'Escape') closeModal();
            });

        });
    </script>
